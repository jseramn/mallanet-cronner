name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Component tests
        run: pnpm test:components

      - name: Build
        run: pnpm build
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          BETTER_AUTH_SECRET: ci-secret-minimo-32-caracteres-ok!!
          BETTER_AUTH_URL: http://localhost:3000

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: check

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cronner
          POSTGRES_PASSWORD: cronner
          POSTGRES_DB: cronner_seed
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cronner -d cronner_seed"
          --health-interval 3s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://cronner:cronner@localhost:5432/cronner_seed
      BETTER_AUTH_SECRET: e2e-secret-minimo-32-caracteres-ok!!!
      BETTER_AUTH_URL: http://localhost:3000
      SEED_MODE: 'true'
      NEXT_PUBLIC_SEED_MODE: 'true'
      E2E_BASE_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Prepare database
        run: pnpm test:e2e:prepare

      - name: Build
        run: pnpm build

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          retention-days: 7
